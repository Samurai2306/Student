services:
  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - app-network

  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    networks:
      - app-network

  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

