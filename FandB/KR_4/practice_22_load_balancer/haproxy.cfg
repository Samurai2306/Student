global
  maxconn 2048

defaults
  mode http
  timeout connect 5s
  timeout client  30s
  timeout server  30s

frontend http_front
  bind *:8081
  default_backend http_back

backend http_back
  balance roundrobin
  option httpchk GET /health
  server server1 127.0.0.1:3000 check
  server server2 127.0.0.1:3001 check

