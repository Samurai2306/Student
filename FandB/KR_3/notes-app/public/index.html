<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4285f4" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <title>Заметки (KR_3)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="app-shell">
        <div class="brand">
          <h1>Заметки</h1>
          <div id="net-status" class="status-pill">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="net-status-text">Онлайн</span>
          </div>
        </div>
        <div class="tabs-wrap">
          <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
          </nav>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <main id="app-content" class="main-card" aria-live="polite"></main>

      <div class="footer-bar">
        <div class="hint"></div>
        <div>
          <button id="enable-push" class="button success">Включить уведомления</button>
          <button id="disable-push" class="button error" style="display: none;">Отключить уведомления</button>
        </div>
      </div>
    </div>

    <script src="socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
